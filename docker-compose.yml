services:
  app:
    image: ghcr.io/maggiesworld/magdi-ai:REL.3.3.0.0
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - MAGDI_WORK_DIR=/magdi-runs
    volumes:
      - ./magdi-runs:/magdi-runs
    ports:
      - "3000:5000"
    depends_on:
      - db

  db:
    image: postgres:15
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: